<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>K44WY3P51 - Mapa Sprzedaży</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@500;600;700;800&display=swap"
    rel="stylesheet">

  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <style>
    :root {
      --primary: #0f172a;
      --accent: #2563eb;
      --surface: #ffffff;
      --bg-light: #f1f5f9;
      --border: #e2e8f0;
      --glass: rgba(255, 255, 255, 0.95);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Lato', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #000000;
    }

    #sidebar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 340px;
      max-width: 85%;
      background: var(--surface);
      z-index: 2000;
      box-shadow: 5px 0 25px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      transform: translateX(-105%);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #sidebar.active {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 20px;
      background: var(--primary);
      color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header h2,
    summary,
    .city-label,
    .county-name-label,
    .fab-btn,
    .nav-btn,
    .legend-chip {
      font-family: 'Montserrat', sans-serif;
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #ffffff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .sidebar-content {
      flex-grow: 1;
      overflow-y: auto;
      padding: 10px;
    }

    details {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    summary {
      padding: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      list-style: none;
    }

    summary::after {
      content: '+';
      font-size: 1.2rem;
      color: var(--primary);
    }

    details[open] summary::after {
      content: '−';
    }

    .details-body {
      padding: 16px;
      border-top: 1px solid var(--border);
      background: #fcfcfc;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      font-family: 'Lato', sans-serif;
    }

    .map-switcher-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .map-card {
      border: 2px solid transparent;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      height: 60px;
    }

    .map-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .map-card span {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      color: #ffffff;
      font-size: 10px;
      text-align: center;
      padding: 2px 0;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
    }

    .map-card.active {
      border-color: var(--accent);
    }

    #map {
      flex-grow: 1;
      height: 100%;
      width: 100%;
      z-index: 1;
    }

    #floating-legend {
      position: absolute;
      z-index: 1000;
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.5);
      bottom: 30px;
      left: 90px;
      max-height: 80vh;
      width: 260px;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .legend-chip {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .legend-chip.active {
      background: var(--primary);
      color: #ffffff;
    }

    .chip-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 10px;
      flex-shrink: 0;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    .city-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      font-weight: 800;
      color: var(--primary);
      text-shadow: 0 0 4px #ffffff, 0 0 2px #ffffff;
      font-size: 13px;
      display: none;
      margin-top: -8px;
    }

    .show-labels .city-label {
      display: block;
    }

    /* Subtelny przycisk nawigacji */
    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: auto;
      margin: 10px auto 0 auto;
      padding: 8px 16px;
      background: rgba(37, 99, 235, 0.05);
      color: #0f172a;
      border: 1px solid rgba(37, 99, 235, 0.2);
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      background: rgba(37, 99, 235, 0.1);
      border-color: rgba(37, 99, 235, 0.3);
      color: #2563eb;
    }

    .bottom-controls {
      position: absolute;
      bottom: 30px;
      left: 0;
      width: 100%;
      padding: 0 20px;
      box-sizing: border-box;
      display: flex;
      justify-content: space-between;
      z-index: 1000;
      pointer-events: none;
    }

    .fab-btn {
      pointer-events: auto;
      background: var(--primary);
      color: #ffffff;
      border: none;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #loader {
      position: absolute;
      top: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), #60a5fa);
      z-index: 3000;
    }

    .setting-item {
      display: flex;
      align-items: center;
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px dashed #eee;
    }

    .setting-item input {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      accent-color: var(--primary);
    }

    .county-label-icon {
      background: transparent !important;
      border: none !important;
    }

    .county-label-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
    }

    .seller-logo {
      border-radius: 50%;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #ffffff;
      overflow: hidden;
      box-sizing: border-box;
    }

    .county-name-label {
      margin-top: 4px;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 0.3px;
      color: #000000;
      text-shadow: -1px -1px 0 #ffffff, 1px -1px 0 #ffffff, -1px 1px 0 #ffffff, 1px 1px 0 #ffffff;
      white-space: nowrap;
      display: none;
    }

    #map.show-county-names .county-name-label {
      display: block;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      font-family: 'Lato', sans-serif;
      padding: 4px;
    }

    .leaflet-popup-content {
      margin: 14px;
      line-height: 1.6;
    }

    .leaflet-popup-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      margin-bottom: 8px;
      color: var(--primary);
    }

    .leaflet-popup-seller {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 10px;
    }

    .leaflet-popup-row {
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    .leaflet-popup-row span {
      color: #64748b;
    }

    .leaflet-popup-row b {
      color: var(--primary);
    }
  </style>
</head>

<body>
  <div id="loader"></div>
  <div id="overlay" onclick="toggleSidebar()"></div>

  <div id="sidebar">
    <div class="sidebar-header">
      <h2>Panel Sterowania</h2>
      <button class="close-btn" onclick="toggleSidebar()">✕</button>
    </div>
    <div class="sidebar-content">
      <details open>
        <summary>🔍 Znajdź Powiat</summary>
        <div class="details-body">
          <input type="text" id="search" placeholder="Wpisz nazwę powiatu..." autocomplete="off">
          <div id="search-results" style="max-height: 150px; overflow-y: auto;"></div>
        </div>
      </details>
      <details open>
        <summary>👤 Ustawienia Widoku</summary>
        <div class="details-body">
          <label>Przezroczystość powiatów:</label>
          <input type="range" id="opacity-range" min="0" max="1" step="0.1" value="0.7" style="width: 100%;">
          <div class="setting-item">
            <input type="checkbox" id="toggle-cities" checked>
            <label for="toggle-cities">Pokaż miasta</label>
          </div>
          <div class="setting-item">
            <input type="checkbox" id="toggle-woj" checked>
            <label for="toggle-woj">Pokaż granice województw</label>
          </div>
          <div class="setting-item">
            <input type="checkbox" id="toggle-labels" checked>
            <label for="toggle-labels">Pokaż buzie</label>
          </div>
        </div>
      </details>
      <details>
        <summary>🗺️ Podkład mapowy</summary>
        <div class="details-body map-switcher-grid">
          <div class="map-card active" onclick="setBasemap('osm', this)">
            <img src="https://tile.openstreetmap.org/6/33/21.png"><span>Drogowa</span>
          </div>
          <div class="map-card" onclick="setBasemap('sat', this)">
            <img
              src="https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/6/21/33"><span>Satelita</span>
          </div>
        </div>
      </details>
    </div>
  </div>

  <div id="map"></div>
  <div id="floating-legend"></div>

  <div class="bottom-controls">
    <button class="fab-btn" style="width:56px; height:56px; border-radius:50%; font-size:24px;"
      onclick="toggleSidebar()">☰</button>
    <button class="fab-btn"
      style="padding: 12px 20px; border-radius: 50px; font-weight: 700; display: flex; align-items:center; gap:8px;"
      onclick="locateUser()">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
        <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      KAJ JO JE
    </button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

  <script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQeWsr5Gpjk0ZpcHPdQr_95TKZaNVEjwPXT523dzFV7U6NzC1YpbXhG89zO1j6VICHqiS45tkZ6XEr3/pub?output=csv';
    const GEOJSON_FILE = 'powiaty4205.geojson';
    const CITIES_GEOJSON = 'miasta.geojson';
    const WOJ_GEOJSON = 'wojewodztwa.geojson';

    let map, geoLayer, citiesLayer, wojLayer, countyLabelsLayer, userLocationMarker;
    let fullData = {};
    let powiatyList = [];
    const sellerColors = {
      "Michał": "#2980B9",
      "nikt": "#808080",
      "Nikt": "#808080"
    };

    const colors = ['#2C3E50', '#C0392B', '#27AE60', '#F39C12', '#8E44AD', '#16A085', '#D35400', '#2980B9'];

    const baseLayers = {
      osm: L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }),
      sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri' })
    };

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('active');
      document.getElementById('overlay').classList.toggle('active');
    }

    function cleanName(n) { return n ? n.toString().toLowerCase().trim().replace("powiat", "").replace("miasto", "").trim() : ""; }

    function getSellerColor(s) {
      if (!s) return '#cbd5e1';
      if (!sellerColors[s]) sellerColors[s] = colors[Object.keys(sellerColors).length % colors.length];
      return sellerColors[s];
    }

    let activeSellerFilter = 'all';

    function getStyle(feature) {
      const name = cleanName(feature.properties.nazwa || feature.properties.Nazwa);
      const row = fullData[name];
      const opacityVal = document.getElementById('opacity-range').value;
      const isMatch = activeSellerFilter === 'all' || (row && row.Sprzedawca === activeSellerFilter);
      return {
        fillColor: getSellerColor(row ? row.Sprzedawca : null),
        weight: 0.8,
        color: 'rgba(255, 255, 255, 0.6)',
        fillOpacity: isMatch ? opacityVal : 0.05,
        opacity: isMatch ? 1 : 0.1
      };
    }

    function setBasemap(type, el) {
      Object.values(baseLayers).forEach(layer => map.removeLayer(layer));
      map.addLayer(baseLayers[type]);
      document.querySelectorAll('.map-card').forEach(c => c.classList.remove('active'));
      if (el) el.classList.add('active');
    }

    function getSafeCenter(layer) {
      try {
        if (layer.getBounds) return layer.getBounds().getCenter();
      } catch (e) { return null; }
      return null;
    }

    async function init() {
      document.getElementById('loader').style.display = 'block';

      map = L.map('map', { zoomControl: false, minZoom: 6 }).setView([52.06, 19.48], 6);
      L.control.zoom({ position: 'topright' }).addTo(map);
      map.addLayer(baseLayers.osm);

      map.createPane('wojPane'); map.getPane('wojPane').style.zIndex = 450;
      map.createPane('labelsPane'); map.getPane('labelsPane').style.zIndex = 550;
      map.createPane('citiesPane'); map.getPane('citiesPane').style.zIndex = 650;

      map.on('zoomend', function () {
        const zoom = map.getZoom();
        const mapEl = document.getElementById('map');
        if (map.hasLayer(citiesLayer) && zoom > 11) mapEl.classList.add('show-labels');
        else mapEl.classList.remove('show-labels');

        const labelsEnabled = document.getElementById('toggle-labels').checked;
        if (countyLabelsLayer) {
          if (labelsEnabled && zoom >= 8 && zoom <= 11) {
            if (!map.hasLayer(countyLabelsLayer)) map.addLayer(countyLabelsLayer);
            if (zoom >= 9) mapEl.classList.add('show-county-names');
            else mapEl.classList.remove('show-county-names');
          } else {
            if (map.hasLayer(countyLabelsLayer)) map.removeLayer(countyLabelsLayer);
            mapEl.classList.remove('show-county-names');
          }
        }
      });

      try {
        const [csvRes, geoRes, citiesRes, wojRes] = await Promise.all([
          fetch(SHEET_URL), fetch(GEOJSON_FILE), fetch(CITIES_GEOJSON), fetch(WOJ_GEOJSON)
        ]);

        const csvText = await csvRes.text();
        const powiatyGeo = await geoRes.json();
        const citiesGeo = await citiesRes.json();
        const wojGeo = await wojRes.json();

        const parsedCsv = Papa.parse(csvText, { header: true, skipEmptyLines: true }).data;
        parsedCsv.forEach(row => { if (row.Nazwa) fullData[cleanName(row.Nazwa)] = row; });

        // Statystyki z obsługą zliczania dużych miast
        const stats = {};
        parsedCsv.forEach(row => {
          if (row.Sprzedawca) {
            if (!stats[row.Sprzedawca]) stats[row.Sprzedawca] = { total: 0, bigCityCounties: new Set() };
            stats[row.Sprzedawca].total += 1;
          }
        });

        // Logika Turf.js - przypisanie miast > 20k do powiatów i ich sprzedawców
        const bigCities = citiesGeo.features.filter(f => f.properties.LICZBAMIESZKANCOW > 20000);

        // NOWOŚĆ: Tworzymy globalną listę powiatów z dużymi miastami
        const globalBigCityCounties = new Set();

        bigCities.forEach(city => {
          for (const county of powiatyGeo.features) {
            if (county.geometry && turf.booleanPointInPolygon(city, county)) {
              const cName = cleanName(county.properties.nazwa || county.properties.Nazwa);

              // Dodajemy powiat do globalnej listy, niezależnie od tego, czy ma przypisanego sprzedawcę
              globalBigCityCounties.add(cName);

              const rData = fullData[cName];
              if (rData && rData.Sprzedawca && stats[rData.Sprzedawca]) {
                stats[rData.Sprzedawca].bigCityCounties.add(cName);
              }
              break;
            }
          }
        });

        countyLabelsLayer = L.layerGroup();

        geoLayer = L.geoJson(powiatyGeo, {
          style: getStyle,
          onEachFeature: (f, l) => {
            const name = f.properties.nazwa || f.properties.Nazwa;
            powiatyList.push({ name: name, layer: l });
            const data = fullData[cleanName(name)];

            let htmlPopup = `<div class="leaflet-popup-title">${name}</div>`;
            if (data) {
              const popupColor = getSellerColor(data.Sprzedawca);
              htmlPopup += `<div class="leaflet-popup-seller" style="color:${popupColor}">${data.Sprzedawca || 'Brak'}</div>`;
              Object.entries(data).forEach(([k, v]) => {
                if (k !== 'Nazwa' && k !== 'Sprzedawca' && k !== 'Foto') {
                  htmlPopup += `<div class="leaflet-popup-row"><span>${k}:</span> <b>${v}</b></div>`;
                }
              });
            }
            l.bindPopup(htmlPopup);
            l.on('click', (e) => { map.flyToBounds(e.target.getBounds(), { padding: [20, 20], maxZoom: 10 }); });

            const center = getSafeCenter(l);
            if (center) {
              const bounds = l.getBounds();
              const width = Math.abs(bounds.getEast() - bounds.getWest());
              const height = Math.abs(bounds.getNorth() - bounds.getSouth());
              const factor = Math.sqrt(width * height);
              const logoSize = Math.max(25, Math.min(65, factor * 80));

              const sName = data ? (data.Sprzedawca || 'Brak') : 'Brak';
              const sColor = getSellerColor(data ? data.Sprzedawca : null);
              const sImg = sName !== 'Brak' ? `${sName}.png` : null;
              const initial = sName.charAt(0);

              const fallbackDiv = `<div class="seller-logo" style="width:${logoSize}px; height:${logoSize}px; background:${sColor}; font-size:${logoSize / 2}px; border: 2.5px solid ${sColor};">${initial}</div>`;

              let logoHtml = '';
              if (sImg) {
                // POPRAWKA: bezpieczne cudzysłowy zapobiegają błędom "" >
                const safeFallbackDiv = fallbackDiv.replace(/"/g, '&quot;');
                logoHtml = `<img src="${sImg}" class="seller-logo" style="width:${logoSize}px; height:${logoSize}px; border: 2.5px solid ${sColor}; background-color: #ffffff;" onerror="this.outerHTML='${safeFallbackDiv}'">`;
              } else {
                logoHtml = fallbackDiv;
              }

              const labelHtml = `<div class="county-label-container">${logoHtml}<div class="county-name-label">${cleanName(name)}</div></div>`;
              const labelIcon = L.divIcon({ html: labelHtml, className: 'county-label-icon', iconSize: [120, 100], iconAnchor: [60, 50] });
              L.marker(center, { icon: labelIcon, pane: 'labelsPane', interactive: false }).addTo(countyLabelsLayer);
            }
          }
        }).addTo(map);

        wojLayer = L.geoJson(wojGeo, {
          pane: 'wojPane', interactive: false,
          style: { color: '#000000', weight: 3, fillOpacity: 0, opacity: 1 }
        }).addTo(map);

        citiesLayer = L.geoJson(citiesGeo, {
          pane: 'citiesPane',
          pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 6, fillColor: "#ffffff", color: "#000000", weight: 2, fillOpacity: 1 }),
          filter: (f) => f.properties.LICZBAMIESZKANCOW && !isNaN(f.properties.LICZBAMIESZKANCOW) && f.properties.LICZBAMIESZKANCOW > 20000,
          onEachFeature: (f, l) => {
            const name = f.properties.NAZWA || "Miejscowość";
            const population = f.properties.LICZBAMIESZKANCOW;
            l.bindTooltip(name, { permanent: true, direction: 'top', className: 'city-label', offset: [0, -8] });

            const lat = l.getLatLng().lat;
            const lng = l.getLatLng().lng;
            const fPop = new Intl.NumberFormat('pl-PL', { maximumFractionDigits: 0 }).format(population);

            const popHtml = `<div class="leaflet-popup-row" style="margin-bottom: 12px; color: #64748b; font-size: 0.95rem;">Mieszkańców: <b style="color: #0f172a; font-size: 1.05rem;">${fPop}</b></div>`;
            const htmlPopup = `
              <div class="leaflet-popup-title" style="margin-bottom: 8px; color: #0f172a;">${name}</div>
              ${popHtml}
              <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}" target="_blank" class="nav-btn">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 9l3 3m0 0l-3 3m3-3H8m13 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                Prowadź do
              </a>`;
            l.bindPopup(htmlPopup, { minWidth: 220, maxWidth: 300 });
          }
        }).addTo(map);

        createFloatingLegend(stats);
        setupSearch();

        document.getElementById('opacity-range').oninput = () => geoLayer.setStyle(getStyle);
        document.getElementById('toggle-cities').onchange = (e) => { if (e.target.checked) map.addLayer(citiesLayer); else map.removeLayer(citiesLayer); };
        document.getElementById('toggle-woj').onchange = (e) => { if (e.target.checked) map.addLayer(wojLayer); else map.removeLayer(wojLayer); };
        document.getElementById('toggle-labels').onchange = () => map.fire('zoomend');
        document.getElementById('loader').style.display = 'none';
      } catch (err) { console.error("Błąd:", err); }
    }

    // Funkcja do poprawnej polskiej odmiany słowa "miasto"
    function getMiastoOdmiana(liczba) {
      if (liczba === 1) return "miasto";

      const reszta10 = liczba % 10;
      const reszta100 = liczba % 100;

      // Dla końcówek 2, 3, 4 (z wyłączeniem 12, 13, 14, które są "miast")
      if (reszta10 >= 2 && reszta10 <= 4 && (reszta100 < 12 || reszta100 > 14)) {
        return "miasta";
      }

      // Dla wszystkich innych (0, 5-9 oraz wyjątków)
      return "miast";
    }

    function createFloatingLegend(stats) {
      const legend = document.getElementById('floating-legend');
      legend.innerHTML = '';

      let totalC = 0;
      let allBigC = new Set();

      Object.values(stats).forEach(s => {
        totalC += s.total;
        s.bigCityCounties.forEach(c => allBigC.add(c));
      });

      const allBigCSize = allBigC.size;
      const allItem = document.createElement('div');
      allItem.className = 'legend-chip active';
      // Użycie funkcji dla "Wszyscy"
      allItem.innerHTML = `<div class="chip-color" style="background:#000000"></div><div class="chip-label">Wszyscy (${totalC} | ${allBigCSize} ${getMiastoOdmiana(allBigCSize)})</div>`;
      allItem.onclick = function () { setActiveFilter('all', this); };
      legend.appendChild(allItem);

      Object.entries(stats).sort((a, b) => b[1].total - a[1].total).forEach(([seller, data]) => {
        const item = document.createElement('div');
        item.className = 'legend-chip';
        const cityCount = data.bigCityCounties.size;

        // Użycie funkcji dla poszczególnych sprzedawców
        item.innerHTML = `<div class="chip-color" style="background:${getSellerColor(seller)}"></div><div class="chip-label">${seller} (${data.total} | ${cityCount} ${getMiastoOdmiana(cityCount)})</div>`;
        item.onclick = function () { setActiveFilter(seller, this); };
        legend.appendChild(item);
      });
    }

    function setActiveFilter(seller, elem) {
      activeSellerFilter = seller;
      geoLayer.setStyle(getStyle);
      document.querySelectorAll('.legend-chip').forEach(c => c.classList.remove('active'));
      elem.classList.add('active');
    }

    function locateUser() {
      map.locate({ setView: true, maxZoom: 10 });
      map.once('locationfound', (e) => {
        if (userLocationMarker) map.removeLayer(userLocationMarker);
        userLocationMarker = L.circleMarker(e.latlng, { radius: 8, fillColor: '#2563eb', color: '#ffffff', fillOpacity: 1 }).addTo(map);
      });
    }

    function setupSearch() {
      const input = document.getElementById('search');
      const res = document.getElementById('search-results');
      input.addEventListener('input', (e) => {
        const q = cleanName(e.target.value);
        res.innerHTML = '';
        if (q.length < 2) return;
        powiatyList.filter(p => cleanName(p.name).includes(q)).slice(0, 5).forEach(m => {
          const d = document.createElement('div');
          d.style.padding = "12px"; d.style.borderBottom = "1px solid #e2e8f0"; d.style.cursor = "pointer";
          d.innerText = m.name;
          d.onclick = () => {
            input.value = m.name; res.innerHTML = '';
            toggleSidebar(); map.flyToBounds(m.layer.getBounds(), { maxZoom: 10 });
            setTimeout(() => m.layer.openPopup(), 1500);
          };
          res.appendChild(d);
        });
      });
    }

    init();
  </script>
</body>

</html>
